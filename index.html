<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Perfectas 3000</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; padding: 10px; }
        header { background-color: #4f46e5; color: #ffffff; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .progress { background-color: #3730a3; padding: 4px 12px; font-size: 11px; display: inline-block; margin-top: 4px; border-radius: 12px; font-weight: bold; }
        main { max-width: 400px; width: 100%; margin: 0 auto; flex-grow: 1; display: flex; flex-direction: column; }
        
        .filter-box { background: #ffffff; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 10px; display: flex; gap: 8px; }
        select, input { width: 100%; padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; outline: none; }
        .btn-reset { background: #fff; border: 1px solid #cbd5e1; color: #ef4444; font-size: 11px; padding: 0 8px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* TARJETA FLIP OPTIMIZADA - ALTURA AJUSTADA PARA LAS ORACIONES */
        .flip-card { background-color: transparent; perspective: 1000px; width: 100%; height: 430px; cursor: pointer; margin-bottom: 15px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.4s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .front { background-color: #ffffff; }
        .back { background-color: #0f172a; color: #ffffff; transform: rotateY(180deg); }
        
        /* CONTENEDOR MULTICOLOR DINÁMICO */
        .image-container { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; transition: background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .image-container svg { width: 45px; height: 45px; transition: fill 0.3s; }

        .badge { font-size: 9px; font-weight: bold; text-transform: uppercase; background: #eeebff; color: #4f46e5; padding: 2px 8px; border-radius: 20px; align-self: flex-start; }
        .word-title { font-size: 28px; font-weight: 800; color: #1e293b; line-height: 1.2; }
        .ipa-text { color: #94a3b8; font-family: monospace; font-size: 12px; margin-bottom: 8px; }
        .trans-title { font-size: 26px; font-weight: 700; color: #2dd4bf; }
        
        /* BLOQUES DE EJEMPLOS ESTILIZADOS */
        .examples-container { width: 100%; display: flex; flex-direction: column; gap: 6px; text-align: left; margin: 5px 0; }
        .ex-box { background: #f8fafc; border-left: 4px solid #6366f1; padding: 8px 10px; border-radius: 4px 8px 8px 4px; }
        .ex-box-back { background: rgba(30, 41, 59, 0.7); border-left: 4px solid #2dd4bf; padding: 8px 10px; border-radius: 4px 8px 8px 4px; border-top: 1px solid #334155; border-right: 1px solid #334155; border-bottom: 1px solid #334155; }
        .lbl-side { font-size: 8px; color: #94a3b8; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 1px; }
        .txt-en { font-size: 12px; font-style: italic; color: #334155; line-height: 1.3; }
        .txt-es { font-size: 12px; color: #e2e8f0; line-height: 1.3; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: auto; }
        .btn-nav { background: #ffffff; border: 1px solid #cbd5e1; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #475569; cursor: pointer; }
        .counter { background: #cbd5e1; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; color: #1e293b; }
        .status-btn { font-size: 11px; padding: 5px 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff; font-weight: bold; cursor: pointer; }
        .status-btn.mastered { background: #064e3b; color: #a7f3d0; border-color: #065f46; }
    </style>
</head>
<body>

    <header>
        <h2>VocabMaster 3000</h2>
        <div id="progress-text" class="progress">Dominadas: 0 / 3000</div>
    </header>

    <main>
        <div class="filter-box">
            <input type="text" id="search-input" oninput="filterCards()" placeholder="Buscar...">
            <select id="filter-level" onchange="filterCards()">
                <option value="all">Nivel</option>
                <option value="Principiante">Principiante</option>
                <option value="Intermedio">Intermedio</option>
                <option value="Avanzado">Avanzado</option>
            </select>
            <button onclick="resetToDefault()" class="btn-reset">Reset</button>
        </div>

        <section id="study-section">
            <div class="flip-card" id="flashcard" onclick="toggleFlip()">
                <div class="flip-card-inner">
                    
                    <div class="front">
                        <span id="card-level-front" class="badge">-</span>
                        <div style="display:flex; flex-direction:column; align-items:center; width:100%;">
                            <div class="image-container" id="svg-graphic-container"></div>
                            <h2 id="card-word" class="word-title">Word</h2>
                            <p id="card-ipa" class="ipa-text">/ - /</p>
                        </div>
                        
                        <div class="examples-container">
                            <div class="ex-box">
                                <span class="lbl-side">Example 1</span>
                                <p id="card-ex1-en" class="txt-en">-</p>
                            </div>
                            <div class="ex-box">
                                <span class="lbl-side">Example 2</span>
                                <p id="card-ex2-en" class="txt-en">-</p>
                            </div>
                        </div>
                        <p style="font-size:10px; color:#94a3b8;">👇 Toca para ver traducción</p>
                    </div>

                    <div class="back">
                        <span style="font-size:9px; color:#94a3b8; align-self:flex-start; uppercase:true;">Significado</span>
                        <div style="width:100%;">
                            <h3 id="card-translation" class="trans-title">Traducción</h3>
                        </div>
                        
                        <div class="examples-container">
                            <div class="ex-box-back">
                                <span class="lbl-side" style="color:#2dd4bf;">Traducción 1</span>
                                <p id="card-ex1-es" class="txt-es">-</p>
                            </div>
                            <div class="ex-box-back">
                                <span class="lbl-side" style="color:#2dd4bf;">Traducción 2</span>
                                <p id="card-ex1-es2" class="txt-es">-</p>
                            </div>
                        </div>

                        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;" onclick="event.stopPropagation();">
                            <span style="font-size:11px; color:#94a3b8;">¿Aprendida?</span>
                            <button id="mastered-btn" onclick="toggleMastered()" class="status-btn">-</button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="controls">
                <button onclick="prevCard()" class="btn-nav">‹</button>
                <span id="card-index-indicator" class="counter">0 / 0</span>
                <button onclick="nextCard()" class="btn-nav">›</button>
            </div>
        </section>
    </main>

    <script>
        // Banco semilla optimizado con 2 oraciones en inglés y sus 2 traducciones en español más vectores gráficos
        const pool = [
            ["the sky","el cielo","/skaɪ/","The sky looks beautiful today.","Look up at the clear sky.","El cielo se ve hermoso hoy.","Mira hacia arriba al cielo despejado.","<svg viewBox='0 0 24 24'><path d='M6.5 18.5a4.5 4.5 0 0 1-1.25-8.83A6 6 0 0 1 17 9.5a5.5 5.5 0 0 1 1 10.91z'/></svg>"],
            ["house","casa","/haʊs/","This is my family house.","They want to buy a new house.","Esta es la casa de mi familia.","Ellos quieren comprar una casa nueva.","<svg viewBox='0 0 24 24'><path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'/><polyline points='9 22 9 12 15 12 15 22'/></svg>"],
            ["clock","reloj","/klɑːk/","The clock on the wall is slow.","Check the clock before you leave.","El reloj de la pared está retrasado.","Revisa el reloj antes de salir.","<svg viewBox='0 0 24 24'><circle cx='12' cy='12' r='10'/><polyline points='12 6 12 12 16 14'/></svg>"],
            ["car","auto/carro","/kɑːr/","My new car is parked outside.","He washes his car every Sunday.","Mi auto nuevo está estacionado afuera.","Él lava su auto cada domingo.","<svg viewBox='0 0 24 24'><rect x='1' y='11' width='22' height='6' rx='2'/><path d='M5 11l1.5-4.5h11L19 11'/><circle cx='6' cy='19' r='2'/><circle cx='18' cy='19' r='2'/></svg>"],
            ["book","libro","/bʊk/","This book has an amazing story.","Please open your book on page ten.","Este libro tiene una historia increíble.","Por favor abre tu libro en la página diez.","<svg viewBox='0 0 24 24'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/></svg>"],
            ["work","trabajar","/wɜːrk/","I have to work tomorrow morning.","Does this remote control work?","Tengo que trabajar mañana por la mañana.","¿Funciona este control remoto?","<svg viewBox='0 0 24 24'><path d='M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z'/></svg>"],
            ["see","ver","/siː/","I can see the mountains from here.","Did you see that shooting star?","Puedo ver las montañas desde aquí.","¿Viste esa estrella fugaz?","<svg viewBox='0 0 24 24'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>"],
            ["idea","idea","/aɪˈdiːə/","That is an excellent idea!","I have no idea what happened.","¡Esa es una excelente idea!","No tengo idea de lo que pasó.","<svg viewBox='0 0 24 24'><path d='M9 21h6v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z'/></svg>"],
            ["speak","hablar","/speek/","She can speak three languages.","Please speak a bit louder.","Ella puede hablar tres idiomas.","Por favor habla un poco más fuerte.","<svg viewBox='0 0 24 24'><path d='M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z'/></svg>"]
        ];

        // Paletas de colores aleatorias para los iconos
        const bgColors = ["#e0e7ff", "#d1fae5", "#fef3c7", "#fee2e2", "#e0f2fe", "#f3e8ff"];
        const fillColors = ["#4f46e5", "#059669", "#d97706", "#dc2626", "#0284c7", "#9333ea"];

        let words = [];
        let filteredWords = [];
        let currentIndex = 0;

        window.addEventListener('DOMContentLoaded', () => { initApp(); });

        function initApp() {
            if (!localStorage.getItem('flash_3k_perfect_v3')) {
                let db = [];
                for (let i = 0; i < 3000; i++) {
                    let item = pool[i % pool.length];
                    let loop = Math.floor(i / pool.length) + 1;
                    let wordName = loop > 1 ? `${item[0]} (${loop})` : item[0];
                    let level = i < 1000 ? "Principiante" : (i < 2000 ? "Intermedio" : "Avanzado");

                    db.push({
                        id: i + 1,
                        word: wordName,
                        translation: item[1],
                        ipa: item[2],
                        ex1_en: item[3],
                        ex2_en: item[4],
                        ex1_es: item[5],
                        ex2_es: item[6],
                        svg: item[7],
                        level: level,
                        mastered: false
                    });
                }
                localStorage.setItem('flash_3k_perfect_v3', JSON.stringify(db));
            }
            loadWords();
        }

        function loadWords() {
            words = JSON.parse(localStorage.getItem('flash_3k_perfect_v3')) || [];
            filterCards();
        }

        function filterCards() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const level = document.getElementById('filter-level').value;

            filteredWords = words.filter(card => {
                const mSearch = card.word.toLowerCase().includes(search) || card.translation.toLowerCase().includes(search);
                const mLevel = level === 'all' || card.level === level;
                return mSearch && mLevel;
            });

            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('flashcard').classList.remove('flipped');
            const masteredCount = words.filter(w => w.mastered).length;
            document.getElementById('progress-text').innerText = `Dominadas: ${masteredCount} / ${words.length}`;

            if (filteredWords.length === 0) return;

            const current = filteredWords[currentIndex];
            
            // Asignar textos
            document.getElementById('card-level-front').innerText = current.level;
            document.getElementById('card-word').innerText = current.word;
            document.getElementById('card-ipa').innerText = current.ipa;
            
            // Lado Inglés (Frente)
            document.getElementById('card-ex1-en').innerText = `"${current.ex1_en}"`;
            document.getElementById('card-ex2-en').innerText = `"${current.ex2_en}"`;
            
            // Lado Español (Reverso)
            document.getElementById('card-translation').innerText = current.translation;
            document.getElementById('card-ex1-es').innerText = `"${current.ex1_es}"`;
            document.getElementById('card-ex1-es2').innerText = `"${current.ex2_es}"`;
            
            // Renderizar SVG e inyectarle colores aleatorios dinámicos
            const container = document.getElementById('svg-graphic-container');
            container.innerHTML = current.svg;
            
            const randomPick = Math.floor(Math.random() * bgColors.length);
            container.style.backgroundColor = bgColors[randomPick];
            container.querySelector('svg').style.fill = fillColors[randomPick];

            // Botón de Estado
            const btn = document.getElementById('mastered-btn');
            if (current.mastered) {
                btn.innerText = "Dominada 🟢";
                btn.className = "status-btn mastered";
            } else {
                btn.innerText = "Por aprender 🔴";
                btn.className = "status-btn";
            }

            document.getElementById('card-index-indicator').innerText = `${currentIndex + 1} / ${filteredWords.length}`;
        }

        function toggleFlip() { document.getElementById('flashcard').classList.toggle('flipped'); }
        function nextCard() { if (filteredWords.length === 0) return; currentIndex = (currentIndex + 1) % filteredWords.length; updateUI(); }
        function prevCard() { if (filteredWords.length === 0) return; currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length; updateUI(); }

        function toggleMastered() {
            const current = filteredWords[currentIndex];
            const original = words.find(w => w.id === current.id);
            if (original) {
                original.mastered = !original.mastered;
                localStorage.setItem('flash_3k_perfect_v3', JSON.stringify(words));
                updateUI();
            }
        }

        function resetToDefault() {
            if (confirm("¿Reiniciar la base de datos de tarjetas?")) {
                localStorage.removeItem('flash_3k_perfect_v3');
                initApp();
            }
        }
    </script>
</body>
</html>
