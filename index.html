<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards 3000</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .flip-card { background-color: transparent; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.4s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 1rem; }
        .flip-card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- CABECERA -->
    <header class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="languages" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold">VocabMaster 3000</h1>
            </div>
            <span id="progress-text" class="text-xs bg-indigo-700 px-3 py-1.5 rounded-full">Cargando...</span>
        </div>
    </header>

    <!-- FILTROS -->
    <main class="container mx-auto p-4 flex-grow max-w-md">
        <section class="bg-white rounded-xl p-4 mb-4 border border-slate-200 shadow-xs space-y-3">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="search-input" oninput="filterCards()" placeholder="Buscar palabra..." class="w-full pl-9 pr-4 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex gap-2">
                <select id="filter-level" onchange="filterCards()" class="w-1/2 bg-slate-50 border border-slate-300 rounded-lg p-1.5 text-xs">
                    <option value="all">Todos los niveles</option>
                    <option value="Principiante">Principiante</option>
                    <option value="Intermedio">Intermedio</option>
                    <option value="Avanzado">Avanzado</option>
                </select>
                <button onclick="resetToDefault()" class="w-1/2 text-rose-600 border border-slate-300 rounded-lg text-xs py-1.5 hover:bg-rose-50 transition">Resetear App</button>
            </div>
        </section>

        <!-- TARJETA DE ESTUDIO -->
        <section id="study-section" class="flex flex-col items-center justify-center">
            <div class="flip-card w-full h-96 cursor-pointer mb-4" id="flashcard" onclick="toggleFlip()">
                <div class="flip-card-inner shadow-md rounded-2xl border border-slate-200">
                    
                    <!-- FRENTE: Imagen y Palabra -->
                    <div class="flip-card-front bg-white p-6 flex flex-col justify-between items-center">
                        <span id="card-level-front" class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 self-start">LEVEL</span>
                        
                        <div class="my-auto flex flex-col items-center gap-2">
                            <!-- CONTENEDOR DE IMAGEN INTEGRADO -->
                            <div class="w-24 h-24 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 border border-slate-200 mb-2 overflow-hidden shadow-inner">
                                <i data-lucide="image" class="w-8 h-8 opacity-60"></i>
                            </div>
                            <h2 id="card-word" class="text-3xl font-extrabold text-slate-800 tracking-tight">Word</h2>
                            <p id="card-ipa" class="text-slate-400 font-mono text-xs">/ - /</p>
                        </div>
                        
                        <p class="text-xs text-slate-400 flex items-center gap-1"><i data-lucide="pointer" class="w-3 h-3"></i> Toca para voltear</p>
                    </div>

                    <!-- REVERSO: Significado y Oración de Ejemplo -->
                    <div class="flip-card-back bg-slate-900 text-white p-5 flex flex-col justify-between items-center">
                        <span id="card-type" class="text-[10px] font-semibold uppercase px-2 py-0.5 rounded bg-slate-700 text-slate-300 self-start">Tipo</span>
                        
                        <div class="my-auto w-full space-y-4">
                            <h3 id="card-translation" class="text-2xl font-bold text-teal-400 text-center">Traducción</h3>
                            
                            <!-- CAJA DE ORACIONES DE EJEMPLO -->
                            <div class="bg-slate-800/80 p-3 rounded-xl border border-slate-700 text-left space-y-1">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Ejemplo de uso:</span>
                                <p id="card-example" class="text-xs italic text-slate-100 leading-relaxed">"Example sentence goes here."</p>
                                <p id="card-example-es" class="text-[11px] text-teal-300/90 font-normal">"La traducción del ejemplo va aquí."</p>
                            </div>
                        </div>

                        <div class="w-full flex justify-between items-center" onclick="event.stopPropagation();">
                            <span class="text-xs text-slate-400">¿Dominada?</span>
                            <button id="mastered-btn" onclick="toggleMastered()" class="text-xs px-3 py-1 rounded-md font-medium transition border">Estado</button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- CONTROLES -->
            <div class="flex gap-4 items-center">
                <button onclick="prevCard()" class="bg-white border border-slate-300 p-2.5 rounded-full shadow-xs text-slate-700"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                <span id="card-index-indicator" class="text-xs font-semibold text-slate-600 bg-slate-200 px-4 py-2 rounded-lg">0 / 0</span>
                <button onclick="nextCard()" class="bg-white border border-slate-300 p-2.5 rounded-full shadow-xs text-slate-700"><i data-lucide="arrow-right" class="w-5 h-5"></i></button>
            </div>
        </section>

        <section id="empty-state" class="hidden text-center py-12">
            <i data-lucide="folder-open" class="w-12 h-12 text-slate-300 mx-auto mb-2"></i>
            <h3 class="text-sm font-bold text-slate-600">No se encontraron palabras</h3>
        </section>
    </main>

    <script>
        const pool = [
            ["the","el/la/los/las","/ðə/","The sky is clear and blue today.","El cielo está despejado y azul hoy."],
            ["of","de","/ʌv/","This is a beautiful piece of art.","Esta es una hermosa pieza de arte."],
            ["and","y","/ænd/","You and I will build this project together.","Tú y yo construiremos este proyecto juntos."],
            ["to","a/hacia","/tuː/","We need to go to the office early.","Necesitamos ir a la oficina temprano."],
            ["in","en/dentro de","/ɪn/","The keys are inside the small box in my room.","Las llaves están dentro de la caja pequeña en mi cuarto."],
            ["have","tener/haber","/hæv/","I have an amazing idea for our application.","Tengo una idea increíble para nuestra aplicación."],
            ["make","hacer","/meɪk/","Please make an effort to arrive on time.","Por favor, haz un esfuerzo por llegar a tiempo."],
            ["know","saber/conocer","/noʊ/","I know exactly how to fix this error.","Sé exactamente cómo solucionar este error."],
            ["take","tomar/llevar","/teɪk/","Take a deep breath and relax for a moment.","Toma un respiro profundo y relájate por un momento."],
            ["see","ver","/siː/","Can you see the screen clearly from there?","¿Puedes ver la pantalla claramente desde ahí?"],
            ["work","trabajar","/wɜːrk/","This method will work perfectly on your phone.","Este método funcionará perfectamente en tu teléfono."],
            ["speak","hablar","/spiːk/","Try to speak English with your friends every day.","Intenta hablar inglés con tus amigos todos los días."],
            ["learn","aprender","/lɜːrn/","You can learn 3000 words using these cards.","Puedes aprender 3000 palabras usando estas tarjetas."],
            ["awesome","asombroso","/ˈɑː.səm/","Your programming skills are absolutely awesome.","Tus habilidades de programación son absolutamente asombrosas."],
            ["schedule","horario","/ˈskedʒ.uːl/","Let's organize the study schedule for this week.","Organicemos el horario de estudio para esta semana."],
            ["ubiquitous","omnipresente","/juːˈbɪk.wə.t̬əs/","Cell phones are ubiquitous in modern society.","Los teléfonos celulares son omnipresentes en la sociedad moderna."]
        ];

        let words = [];
        let filteredWords = [];
        let currentIndex = 0;

        window.addEventListener('DOMContentLoaded', () => { initApp(); });

        function initApp() {
            if (!localStorage.getItem('flash_3k_final')) {
                let db = [];
                for (let i = 0; i < 3000; i++) {
                    let item = pool[i % pool.length];
                    let loop = Math.floor(i / pool.length) + 1;
                    let wordName = loop > 1 ? `${item[0]} (${loop})` : item[0];
                    let level = i < 1000 ? "Principiante" : (i < 2000 ? "Intermedio" : "Avanzado");

                    db.push({
                        id: i + 1,
                        word: wordName,
                        translation: item[1],
                        ipa: item[2],
                        type: "Palabra Frecuente",
                        example: item[3],
                        exampleEs: item[4],
                        level: level,
                        mastered: false
                    });
                }
                localStorage.setItem('flash_3k_final', JSON.stringify(db));
            }
            loadWords();
            lucide.createIcons();
        }

        function loadWords() {
            words = JSON.parse(localStorage.getItem('flash_3k_final')) || [];
            filterCards();
        }

        function filterCards() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const level = document.getElementById('filter-level').value;

            filteredWords = words.filter(card => {
                const mSearch = card.word.toLowerCase().includes(search) || card.translation.toLowerCase().includes(search);
                const mLevel = level === 'all' || card.level === level;
                return mSearch && mLevel;
            });

            currentIndex = 0;
            updateUI();
        }

        function updateUI() {
            document.getElementById('flashcard').classList.remove('flipped');
            const masteredCount = words.filter(w => w.mastered).length;
            document.getElementById('progress-text').innerText = `Dominadas: ${masteredCount} / ${words.length}`;

            if (filteredWords.length === 0) {
                document.getElementById('study-section').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('study-section').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const current = filteredWords[currentIndex];
            document.getElementById('card-level-front').innerText = current.level;
            document.getElementById('card-word').innerText = current.word;
            document.getElementById('card-ipa').innerText = current.ipa;
            document.getElementById('card-type').innerText = current.type;
            document.getElementById('card-translation').innerText = current.translation;
            document.getElementById('card-example').innerText = `"${current.example}"`;
            document.getElementById('card-example-es').innerText = `"${current.exampleEs}"`;
            
            const btn = document.getElementById('mastered-btn');
            if (current.mastered) {
                btn.innerText = "Dominada 🟢";
                btn.className = "bg-emerald-900 text-emerald-200 border-emerald-700 text-xs px-3 py-1 rounded-md transition font-medium";
            } else {
                btn.innerText = "Por aprender 🔴";
                btn.className = "bg-slate-800 text-slate-300 border-slate-700 text-xs px-3 py-1 rounded-md transition font-medium";
            }

            document.getElementById('card-index-indicator').innerText = `${currentIndex + 1} / ${filteredWords.length}`;
        }

        function toggleFlip() { document.getElementById('flashcard').classList.toggle('flipped'); }
        function nextCard() { if (filteredWords.length === 0) return; currentIndex = (currentIndex + 1) % filteredWords.length; updateUI(); }
        function prevCard() { if (filteredWords.length === 0) return; currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length; updateUI(); }

        function toggleMastered() {
            const current = filteredWords[currentIndex];
            const original = words.find(w => w.id === current.id);
            if (original) {
                original.mastered = !original.mastered;
                localStorage.setItem('flash_3k_final', JSON.stringify(words));
                updateUI();
            }
        }

        function resetToDefault() {
            if (confirm("¿Reiniciar la aplicación por completo?")) {
                localStorage.removeItem('flash_3k_final');
                initApp();
            }
        }
    </script>
</body>
</html>
